name: TEST - Texto + Email completo

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-full:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install pandas google-generativeai numpy markdown lxml

    - name: Generar newsletter con AI Writer
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python ai_writer.py

    - name: Mostrar texto generado
      run: |
        echo "========== NEWSLETTER GENERADA =========="
        cat newsletter_borrador.md
        echo "========================================="

    - name: Enviar email de prueba
      env:
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        URL_SUSCRIPTORES: ${{ secrets.URL_SUSCRIPTORES }}
      run: python email_sender.py
